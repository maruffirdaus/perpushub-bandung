name: iOS Build

on:
  workflow_dispatch:

jobs:
  ios-build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make gradlew Executable
        run: chmod +x gradlew

      - name: Build iOS Archive
        env:
          BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL }}
          MAPTILER_API_KEY: ${{ secrets.MAPTILER_API_KEY }}
        run: |
          xcodebuild archive \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -archivePath $RUNNER_TEMP/iosApp.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          cd $RUNNER_TEMP/iosApp.xcarchive/Products
          APP_NAME=$(basename Applications/*.app .app)
          zip -r $RUNNER_TEMP/$APP_NAME.ipa Applications

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-unsigned
          path: ${{ runner.temp }}/*.ipa
          retention-days: 7
